<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src 'unsafe-inline' https://cdnjs.cloudflare.com;
                 style-src 'unsafe-inline';
                 base-uri 'none';
                 form-action 'none';">
  <meta name="referrer" content="no-referrer">
  <title>Danesh // Software Developer</title>

  <style>
    ::selection {
      background: #CCCCCC;
      color: #000000;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #0C0C0C;
      color: #CCCCCC;
      font-family: 'Consolas', 'Courier New', Courier, monospace;
      font-size: clamp(12px, 2vw, 14px);
      line-height: 1.5;
      min-height: 100%;
      overflow-y: auto;
    }

    body {
      padding: 8px 12px;
    }

    ul {
      list-style: none;
    }

    .cmd-line {
      opacity: 0;
      visibility: hidden;
      white-space: nowrap;
    }

    a {
      color: #3B9FD4;
      text-decoration: underline;
    }

    a:hover,
    a:focus-visible {
      color: #6DC8F0;
      outline: none;
    }

    #final-prompt {
      opacity: 0;
      visibility: hidden;
    }

    #cursor {
      visibility: hidden;
    }

    #cursor.active {
      visibility: visible;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (max-width: 520px) {
      body      { font-size: 11px; padding: 6px 8px; }
      .cmd-line { white-space: pre-wrap; word-break: break-word; }
    }
  </style>

  <noscript>
    <style>
      .cmd-line,
      #final-prompt { opacity: 1 !important; visibility: visible !important; }
      #cursor       { visibility: visible !important; }
    </style>
  </noscript>

</head>
<body>

  <p id="browser-line"></p>
  <p>(c) RobCo Industries. All rights reserved.</p>

  <ul id="lines">
    <li>&nbsp;</li>
    <li class="cmd-line" id="l1">C:\name&gt;<span id="v1"> Danesh Iqbal</span></li>
    <li class="cmd-line" id="l2">C:\role&gt;<span id="v2"> Software Developer @ Everway</span></li>
    <li class="cmd-line" id="l3">C:\extra&gt; <span id="v3"> Recordify \\ Dafni</span></li>
    <li class="cmd-line" id="l4">C:\stack&gt;<span id="v4"> TypeScript \\ React \\ Next \\ Node \\ PNPM \\ Tailwind \\ PHP \\ ASP.NET</span></li>
    <li class="cmd-line" id="l5">C:\learning&gt;<span id="v5"> Ruby on Rails \\ Go</span></li>
    <li class="cmd-line" id="l6">C:\contact&gt; <span id="v6"></span></li>
  </ul>

  <p id="final-prompt">C:\&gt;<span id="cursor" aria-hidden="true">|</span></p>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
    integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>

  <script>
  (function () {
    'use strict';

    // Browser info line - no animation
    (function () {
      var ua   = navigator.userAgent;
      var name = 'Unknown Browser';
      var ver  = '';

      if (/Edg\//.test(ua)) {
        name = 'Microsoft Edge';
        ver  = (ua.match(/Edg\/([\d.]+)/) || [])[1] || '';
      } else if (/OPR\//.test(ua)) {
        name = 'Opera';
        ver  = (ua.match(/OPR\/([\d.]+)/) || [])[1] || '';
      } else if (/Chrome\//.test(ua) && !/Chromium/.test(ua)) {
        name = 'Google Chrome';
        ver  = (ua.match(/Chrome\/([\d.]+)/) || [])[1] || '';
      } else if (/Firefox\//.test(ua)) {
        name = 'Mozilla Firefox';
        ver  = (ua.match(/Firefox\/([\d.]+)/) || [])[1] || '';
      } else if (/Safari\//.test(ua)) {
        name = 'Apple Safari';
        ver  = (ua.match(/Version\/([\d.]+)/) || [])[1] || '';
      }

      document.getElementById('browser-line').textContent =
        name + (ver ? ' [Version ' + ver + ']' : '');
    }());

    var SPEED = 40;

    function prepType(el, speed, onDone) {
      var full = el.textContent;
      el.textContent = '';
      var dur = Math.max(full.length / speed, 0.04);
      return {
        dur: dur,
        play: function () {
          var proxy = { n: 0 };
          gsap.to(proxy, {
            n: full.length,
            duration: dur,
            ease: 'none',
            onUpdate: function () {
              el.textContent = full.slice(0, Math.round(proxy.n)) + '|';
            },
            onComplete: function () {
              el.textContent = '';
              if (onDone) {
                onDone(el);
              } else {
                el.textContent = full;
              }
            }
          });
        }
      };
    }

    var v1t = prepType(document.getElementById('v1'), SPEED);
    var v2t = prepType(document.getElementById('v2'), SPEED);

    var v3t = prepType(document.getElementById('v3'), SPEED, function (el) {
      var frag = document.createDocumentFragment();
      var a1   = document.createElement('a');
      a1.href  = 'https://chromewebstore.google.com/detail/recordify-free-screen-rec/igpmccnfdgkfbgdmnamhlphegclidlbk';
      a1.target = '_blank';
      a1.rel   = 'noopener noreferrer';
      a1.textContent = 'Recordify';
      frag.appendChild(a1);
      frag.appendChild(document.createTextNode(' \\\\ '));
      var a2   = document.createElement('a');
      a2.href  = 'https://dafni.ai';
      a2.target = '_blank';
      a2.rel   = 'noopener noreferrer';
      a2.textContent = 'Dafni';
      frag.appendChild(a2);
      el.appendChild(frag);
    });

    var v4t = prepType(document.getElementById('v4'), SPEED);
    var v5t = prepType(document.getElementById('v5'), SPEED);

    var v6El   = document.getElementById('v6');
    var v6text = 'GitHub \\ LinkedIn';
    var v6dur  = Math.max(v6text.length / SPEED, 0.04);
    var v6t = {
      dur: v6dur,
      play: function () {
        var proxy = { n: 0 };
        gsap.to(proxy, {
          n: v6text.length,
          duration: v6dur,
          ease: 'none',
          onUpdate: function () {
            v6El.textContent = v6text.slice(0, Math.round(proxy.n)) + '|';
          },
          onComplete: function () {
            var frag = document.createDocumentFragment();
            var a1   = document.createElement('a');
            a1.href  = 'https://github.com/clarodanesh';
            a1.target = '_blank';
            a1.rel   = 'noopener noreferrer';
            a1.textContent = 'GitHub';
            frag.appendChild(a1);
            frag.appendChild(document.createTextNode(' \\\\ '));
            var a2   = document.createElement('a');
            a2.href  = 'https://uk.linkedin.com/in/daneshiqbal';
            a2.target = '_blank';
            a2.rel   = 'noopener noreferrer';
            a2.textContent = 'LinkedIn';
            frag.appendChild(a2);
            v6El.textContent = '';
            v6El.appendChild(frag);
          }
        });
      }
    };

    var GAP = 0.08;
    var tl  = gsap.timeline({ defaults: { ease: 'none' } });

    tl
      .to('#l1', { autoAlpha: 1, duration: 0 }, 0.25)
      .call(v1t.play).to({}, { duration: v1t.dur })

      .to('#l2', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(v2t.play).to({}, { duration: v2t.dur })

      .to('#l3', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(v3t.play).to({}, { duration: v3t.dur })

      .to('#l4', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(v4t.play).to({}, { duration: v4t.dur })

      .to('#l5', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(v5t.play).to({}, { duration: v5t.dur })

      .to('#l6', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(v6t.play).to({}, { duration: v6t.dur })

      .to('#final-prompt', { autoAlpha: 1, duration: 0 }, '+=' + GAP)
      .call(function () {
        document.getElementById('cursor').classList.add('active');
      });

  }());
  </script>
</body>
</html>
